name: Fetch Deep Reading

on:
  schedule:
    - cron: "0 3,15 * * *"   # 每12小时：UTC 3点和15点
  workflow_dispatch:

jobs:
  fetch-reading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install feedparser requests
      - name: Fetch deep reading articles
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/fetch_reading.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reading.json
          git diff --cached --quiet || git commit -m "Auto-update reading data [skip ci]"
          git push
